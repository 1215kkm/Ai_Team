<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>강팀 회의록</title>

<!-- Pretendard (본문/UI) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<!-- Agbalumo (로고 장식 한정) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap">
<!-- html2canvas (이미지 저장 전용 — 캡처 기능이라 예외 허용) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  /* ===== Crowny Class 브랜드 ===== */
  --primary:#8A38F5;
  --primary-dark:#7030D4;
  --secondary:#D53A6B;
  --gradient:linear-gradient(135deg,#8A38F5 0%,#D53A6B 100%);

  /* ===== 라이트 영역 ===== */
  --light-bg:#F3F4F6;
  --light-card:#FFFFFF;
  --light-border:#E5E7EB;
  --text-dark:#1F2937;
  --text-muted:#6B7280;

  /* ===== 속마음(aside) — CEO 지정: 대사보다 확실히 연하게 ===== */
  --aside-color:#9AA0A6;

  /* ===== 모서리 ===== */
  --radius-md:10px;
  --radius-lg:12px;
  --radius-xl:16px;
  --radius-2xl:20px;
  --radius-full:9999px;

  /* ===== 그림자 ===== */
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg:0 10px 15px rgba(0,0,0,0.10);

  /* ===== 폰트 ===== */
  --font-family-base:'Pretendard Variable',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-family-display:'Agbalumo',cursive;

  /* ===== 멤버 색상 (회의록 전용 팔레트) ===== */
  --c-pm:#1E3A8A;        /* 강대표 네이비 */
  --c-designer:#EC4899;  /* 강디 핑크 */
  --c-dev:#0D9488;       /* 강개발 틸 */
  --c-qa:#7C3AED;        /* 강체크 퍼플 */
  --c-marketer:#F59E0B;  /* 아뱅 앰버 */
  --c-ceo:#111827;       /* CEO 다크 */
}

*{box-sizing:border-box;margin:0;padding:0;}

html{ -webkit-text-size-adjust:100%; }

body{
  font-family:var(--font-family-base);
  font-size:16px;
  line-height:1.65;
  color:var(--text-dark);
  background:var(--light-bg);
  padding:16px 12px 64px;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}

.wrap{ max-width:720px; margin:0 auto; }

/* ================= 이미지 저장 버튼 ================= */
.save-btn{
  position:fixed;
  top:14px; right:14px;
  z-index:100;
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 16px;
  min-height:44px;
  font-family:var(--font-family-base);
  font-size:16px; font-weight:600;
  color:#fff;
  background:var(--gradient);
  border:none; border-radius:var(--radius-full);
  box-shadow:0 4px 14px rgba(138,56,245,0.35);
  cursor:pointer;
  transition:transform .2s ease, box-shadow .2s ease;
}
.save-btn:hover{ transform:translateY(-2px); box-shadow:0 6px 18px rgba(138,56,245,0.45); }
.save-btn:active{ transform:translateY(0); }
.save-btn:disabled{ opacity:.6; cursor:progress; }

/* ================= 캡처 영역 ================= */
#capture{
  background:var(--light-bg);
  border-radius:var(--radius-2xl);
}

/* ================= 헤더 ================= */
.header{
  background:var(--gradient);
  color:#fff;
  border-radius:var(--radius-2xl);
  padding:24px 22px;
  box-shadow:var(--shadow-lg);
}
.header .brand{
  font-family:var(--font-family-display);
  font-size:18px;
  opacity:.95;
  letter-spacing:.3px;
}
.header h1{
  font-size:26px;
  font-weight:800;
  line-height:1.3;
  margin:6px 0 10px;
  word-break:keep-all;
}
.header .meta{
  display:flex; flex-wrap:wrap; gap:8px 14px;
  font-size:16px;
  opacity:.95;
}
.header .meta span{ display:inline-flex; align-items:center; gap:5px; }

/* ================= 발언 턴 (카톡 말풍선) ================= */
.turns{ margin-top:18px; }

.turn{ margin:16px 4px; }
.turn .who{
  display:inline-flex; align-items:center; gap:8px;
  font-size:16px; font-weight:700;
  margin-bottom:6px;
  padding-left:2px;
}
.turn .badge{
  display:inline-flex; align-items:center; justify-content:center;
  width:30px; height:30px;
  border-radius:var(--radius-full);
  font-size:16px;
  color:#fff;
  box-shadow:var(--shadow-sm);
}
.turn .bubble{
  border-left:4px solid var(--light-border);
  border-radius:var(--radius-lg);
  padding:14px 16px;
  box-shadow:var(--shadow-sm);
  max-width:100%;
}
.turn .bubble p{
  font-size:16px;
  line-height:1.65;
  color:#1A1A1A;      /* 대사 — 진한 검정 */
  word-break:keep-all;
}
.turn .bubble p + p{ margin-top:8px; }

/* 속마음 지문 — CEO 지정: 연회색·이탤릭·살짝 작게, 대사보다 확실히 연하게 */
.turn .bubble p.aside{
  font-style:italic;
  font-size:15px;
  line-height:1.55;
  color:var(--aside-color);
  margin-top:8px;
  padding:2px 0 2px 12px;
  border-left:2px dotted #CBD0D6;
  margin-left:2px;
}

/* --- 멤버별 색 매핑 (이름·보더·배지·연한 tint 배경) --- */
.turn.pm .who{color:var(--c-pm);}
.turn.pm .badge{background:var(--c-pm);}
.turn.pm .bubble{border-left-color:var(--c-pm); background:rgba(30,58,138,0.08);}

.turn.designer .who{color:var(--c-designer);}
.turn.designer .badge{background:var(--c-designer);}
.turn.designer .bubble{border-left-color:var(--c-designer); background:rgba(236,72,153,0.08);}

.turn.dev .who{color:var(--c-dev);}
.turn.dev .badge{background:var(--c-dev);}
.turn.dev .bubble{border-left-color:var(--c-dev); background:rgba(13,148,136,0.08);}

.turn.qa .who{color:var(--c-qa);}
.turn.qa .badge{background:var(--c-qa);}
.turn.qa .bubble{border-left-color:var(--c-qa); background:rgba(124,58,237,0.08);}

.turn.marketer .who{color:#B45309;}   /* 앰버는 텍스트만 진하게 (가독성) */
.turn.marketer .badge{background:var(--c-marketer);}
.turn.marketer .bubble{border-left-color:var(--c-marketer); background:rgba(245,158,11,0.10);}

.turn.ceo .who{color:var(--c-ceo);}
.turn.ceo .badge{background:var(--c-ceo);}
.turn.ceo .bubble{border-left-color:var(--c-ceo); background:rgba(17,24,39,0.06);}

/* ================= 요약 (실무 카드) ================= */
.summary{
  margin:26px 4px 4px;
}
.summary-title{
  display:flex; align-items:center; gap:8px;
  font-size:20px; font-weight:800;
  color:var(--c-pm);
  margin-bottom:12px;
}
.sum-card{
  background:var(--light-card);
  border:1px solid var(--light-border);
  border-left:4px solid var(--c-pm);
  border-radius:var(--radius-xl);
  padding:16px 18px;
  box-shadow:var(--shadow-md);
  margin-bottom:12px;
}
.sum-card h3{
  font-size:16px; font-weight:700;
  color:var(--c-pm);
  margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}
.sum-card ul{ list-style:none; }
.sum-card li{
  font-size:16px; line-height:1.6;
  padding:5px 0 5px 18px;
  position:relative;
  word-break:keep-all;
}
.sum-card li::before{
  content:"";
  position:absolute; left:2px; top:13px;
  width:6px; height:6px; border-radius:50%;
  background:var(--c-pm);
}
.sum-card.undecided{ border-left-color:#F59E0B; }
.sum-card.undecided h3{ color:#B45309; }
.sum-card.undecided li::before{ background:#F59E0B; }
.sum-card.next{ border-left-color:#22C55E; }
.sum-card.next h3{ color:#15803D; }
.sum-card.next li::before{ background:#22C55E; }

/* ================= 한 줄 코멘트 ================= */
.comments{ margin:26px 4px 4px; }
.comments-title{
  font-size:20px; font-weight:800;
  color:var(--text-dark);
  margin-bottom:12px;
}
.comment{
  display:flex; align-items:flex-start; gap:10px;
  background:var(--light-card);
  border:1px solid var(--light-border);
  border-radius:var(--radius-lg);
  padding:12px 14px;
  box-shadow:var(--shadow-sm);
  margin-bottom:10px;
}
.comment .badge{
  flex:0 0 auto;
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px;
  border-radius:var(--radius-full);
  font-size:16px; color:#fff;
  box-shadow:var(--shadow-sm);
}
.comment .c-name{ font-weight:700; }
.comment p{ font-size:16px; line-height:1.55; }
.comment.pm .badge{background:var(--c-pm);} .comment.pm .c-name{color:var(--c-pm);}
.comment.designer .badge{background:var(--c-designer);} .comment.designer .c-name{color:var(--c-designer);}
.comment.dev .badge{background:var(--c-dev);} .comment.dev .c-name{color:var(--c-dev);}
.comment.qa .badge{background:var(--c-qa);} .comment.qa .c-name{color:var(--c-qa);}
.comment.marketer .badge{background:var(--c-marketer);} .comment.marketer .c-name{color:#B45309;}
.comment.ceo .badge{background:var(--c-ceo);} .comment.ceo .c-name{color:var(--c-ceo);}

/* ================= 반응형 ================= */
@media (min-width:640px){
  body{ padding:24px 20px 64px; }
  .turn .bubble{ max-width:88%; }
  .header h1{ font-size:32px; }
}

/* 캡처 순간 저장버튼 감추기용 */
.capturing .save-btn{ visibility:hidden; }
</style>
</head>
<body>

<button class="save-btn" id="saveBtn" onclick="saveAsImage()">📷 이미지로 저장</button>

<div class="wrap">
  <div id="capture">

    <!-- ================= 헤더 ================= -->
    <header class="header">
      <div class="brand">강팀 · Crowny Class</div>
      <h1 id="mtTitle">회의 주제를 입력하세요</h1>
      <div class="meta">
        <span>📅 <span id="mtDate">YYYY-MM-DD</span></span>
        <span>📁 <span id="mtProject">프로젝트명</span></span>
      </div>
    </header>
<!-- ================= 발언 턴 ================= -->
    <div class="turns">
      <!-- TURNS_START -->

      <!-- 표준 turn 블록 예시 (복사해서 사용) — 클래스: pm/designer/dev/qa/marketer/ceo
      <div class="turn designer">
        <div class="who"><span class="badge">🎨</span></div>
        <div class="bubble">
          <p>대사...</p>
          <p class="aside">(속마음 — 괄호만, 접두어 없음)</p>
        </div>
      </div>
      -->

      <!-- TURNS_END -->
    </div>

    <!-- ================= 요약 (결정/미결정/다음액션) ================= -->
    <div class="summary">
      <div class="summary-title">🎯 회의 요약</div>
      <!-- SUMMARY_START -->

      <div class="sum-card decided">
        <h3>✅ 결정</h3>
        <ul>
          <li>결정 항목 — 근거 / 담당</li>
        </ul>
      </div>

      <div class="sum-card undecided">
        <h3>⚠️ 미결정</h3>
        <ul>
          <li>미결정 항목 — 이유 / 다음 논의 시점</li>
        </ul>
      </div>

      <div class="sum-card next">
        <h3>➡️ 다음 액션</h3>
        <ul>
          <li>액션 — 담당 / 기한</li>
        </ul>
      </div>

      <!-- SUMMARY_END -->
    </div>

    <!-- ================= 한 줄 코멘트 ================= -->
    <div class="comments">
      <div class="comments-title">💬 한 줄씩</div>
      <!-- COMMENTS_START -->

      <!-- 코멘트 블록 예시
      <div class="comment designer">
        <span class="badge">🎨</span>
        <p><span class="c-name">강디</span> — 한 줄 코멘트.</p>
      </div>
      -->

      <!-- COMMENTS_END -->
    </div>

  </div><!-- /#capture -->
</div><!-- /.wrap -->

<script>
async function saveAsImage(){
  const btn = document.getElementById('saveBtn');
  const target = document.getElementById('capture');
  const title = (document.getElementById('mtTitle')?.innerText || '회의록').trim().replace(/[\\/:*?"<>|]/g,'');

  btn.disabled = true;
  document.body.classList.add('capturing');   // 캡처 순간 버튼 숨김
  try{
    const canvas = await html2canvas(target, {
      scale: 2,                    // 모바일에서도 선명하게
      backgroundColor: '#ffffff',
      useCORS: true,
      windowWidth: target.scrollWidth,
      onclone: (doc)=>{ doc.querySelector('.save-btn')?.style.setProperty('display','none'); }
    });
    const link = document.createElement('a');
    link.download = '강팀회의록-' + title + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(e){
    alert('이미지 저장에 실패했어요. 다시 시도해 주세요.');
    console.error(e);
  }finally{
    document.body.classList.remove('capturing');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
